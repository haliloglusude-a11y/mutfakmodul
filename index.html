<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
        .app-container { display: flex; flex-direction: column; width: 100vw; height: 100vh; }
        .menu { width: 100%; background: #fff; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 1000; overflow-x: auto; white-space: nowrap; }
        .grup { display: inline-flex; align-items: center; gap: 8px; }
        .ekle-btn { padding: 8px 12px; border: none; border-radius: 5px; color: white; cursor: pointer; font-size: 11px; font-weight: bold; }
        #canvas-wrapper { flex-grow: 1; width: 100vw; background: #eee; position: relative; touch-action: none; }
        canvas { touch-action: none; }
        input { width: 45px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="menu">
        <div class="grup">
            <input type="number" id="genislikInput" value="35"> <b>cm</b>
            <button class="ekle-btn" style="background:#2980b9" onclick="vektorModulEkle('cekmece3')">3Ç</button>
            <button class="ekle-btn" style="background:#f1c40f; color:#000" onclick="vektorModulEkle('ciftKapak')">ÇK</button>
            <button class="ekle-btn" style="background:#d63031" onclick="vektorModulEkle('tekKapak')">TK</button>
            <button class="ekle-btn" style="background:#6c5ce7" onclick="vektorModulEkle('koseModul')">Köşe</button>
            <button class="ekle-btn" style="background:#2d3436" onclick="temizle()">X</button>
        </div>
    </div>
    <div id="canvas-wrapper">
        <canvas id="mutfakCanvas"></canvas>
    </div>
</div>

<script>
    var canvas = new fabric.Canvas('mutfakCanvas');
    // Mobil için başlangıçta ekran boyutuna göre ayarla
    function resizeCanvas() {
        canvas.setDimensions({width: window.innerWidth * 5, height: window.innerHeight});
    }
    window.onload = resizeCanvas;
    
    function vektorModulEkle(tur) {
        var cm = parseInt(document.getElementById('genislikInput').value) || 35;
        var w = cm * 2.2; 
        var h = 180;
        var renk = (tur === 'tekKapak' ? '#d63031' : (tur === 'koseModul' ? '#6c5ce7' : '#3498db'));
        
        var rect = new fabric.Rect({
            left: 100 + (canvas.getObjects().length * 150),
            top: 200,
            width: w, height: h,
            fill: renk,
            stroke: '#000',
            strokeWidth: 2
        });
        
        var text = new fabric.Text(cm + ' cm', { fontSize: 14, fontWeight: 'bold', left: rect.left + 5, top: rect.top + 5 });
        var group = new fabric.Group([rect, text]);
        canvas.add(group);
        canvas.viewportTransform[4] = -(group.left - 50);
        canvas.requestRenderAll();
    }

    function temizle() { canvas.clear(); }

    canvas.on('mouse:down', function(opt) { this.isDragging = true; this.lastPosX = opt.e.clientX || (opt.e.touches ? opt.e.touches[0].clientX : 0); this.lastPosY = opt.e.clientY || (opt.e.touches ? opt.e.touches[0].clientY : 0); });
    canvas.on('mouse:move', function(opt) {
        if (this.isDragging) {
            var e = opt.e; var x = e.clientX || (e.touches ? e.touches[0].clientX : 0); var y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            var vpt = this.viewportTransform;
            vpt[4] += x - this.lastPosX; vpt[5] += y - this.lastPosY;
            this.requestRenderAll();
            this.lastPosX = x; this.lastPosY = y;
        }
    });
    canvas.on('mouse:up', function() { this.isDragging = false; });
</script>
</body>
</html>
