<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
    .app-container { display: flex; flex-direction: column; width: 100vw; height: 100vh; }
    .menu { width: 100%; background: #fff; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 1000; overflow-x: auto; white-space: nowrap; }
    .buton-izgara { display: inline-flex; gap: 5px; }
    .ekle-btn { padding: 10px; border: none; border-radius: 5px; color: white; cursor: pointer; font-size: 12px; font-weight: bold; }
    #canvas-wrapper { flex-grow: 1; width: 100vw; background: #eee; position: relative; }
    canvas { cursor: grab; }
</style>

<div class="app-container">
    <div class="menu">
        <div class="buton-izgara">
            <button class="ekle-btn" style="background:#2980b9" onclick="vektorModulEkle('cekmece3')">3 Çekmece</button>
            <button class="ekle-btn" style="background:#f1c40f; color:#000" onclick="vektorModulEkle('ciftKapak')">Çift Kapak</button>
            <button class="ekle-btn" style="background:#d63031" onclick="vektorModulEkle('tekKapak')">Tek Kapak</button>
            <button class="ekle-btn" style="background:#6c5ce7" onclick="vektorModulEkle('koseModul')">Köşe</button>
            <button class="ekle-btn" style="background:#2d3436" onclick="temizle()">Temizle</button>
        </div>
    </div>
    <div id="canvas-wrapper">
        <canvas id="mutfakCanvas"></canvas>
    </div>
</div>

<script>
    var canvas = new fabric.Canvas('mutfakCanvas');
    canvas.setDimensions({width: 10000, height: 2000}); // Sonsuz gibi geniş alan

    function vektorModulEkle(tur) {
        var w = (tur === 'tekKapak' ? 55 : 120); // 25cm -> 55px (izometrik oranlı)
        var h = 180;
        var renk = (tur === 'tekKapak' ? '#d63031' : (tur === 'koseModul' ? '#6c5ce7' : '#3498db'));
        
        var rect = new fabric.Rect({
            left: 100 + (canvas.getObjects().length * 130),
            top: 200,
            width: w, height: h,
            fill: renk,
            stroke: '#000',
            strokeWidth: 2
        });
        
        var text = new fabric.Text(tur === 'tekKapak' ? '25x90' : 'Modül', {
            fontSize: 12, left: rect.left + 5, top: rect.top + 5
        });

        var group = new fabric.Group([rect, text]);
        canvas.add(group);
        canvas.viewportTransform[4] = -(group.left - 100);
        canvas.requestRenderAll();
    }

    function temizle() { canvas.clear(); }

    // Sürükle-Bırak (Pan) özelliği
    canvas.on('mouse:down', function(opt) {
        this.isDragging = true;
        this.lastPosX = opt.e.clientX;
        this.lastPosY = opt.e.clientY;
    });
    canvas.on('mouse:move', function(opt) {
        if (this.isDragging) {
            var vpt = this.viewportTransform;
            vpt[4] += opt.e.clientX - this.lastPosX;
            vpt[5] += opt.e.clientY - this.lastPosY;
            this.requestRenderAll();
            this.lastPosX = opt.e.clientX;
            this.lastPosY = opt.e.clientY;
        }
    });
    canvas.on('mouse:up', function() { this.isDragging = false; });
</script>
