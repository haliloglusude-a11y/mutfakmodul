<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; }
        #menu { padding: 10px; background: #eee; display: flex; gap: 5px; }
        button { padding: 10px; }
        #canvas-wrapper { width: 100vw; height: 90vh; background: #fff; }
    </style>
</head>
<body>
    <div id="menu">
        <input type="number" id="gen" value="35">
        <button onclick="ekle('blue')">Çekmece</button>
        <button onclick="ekle('red')">Tek Kapak</button>
        <button onclick="location.reload()">Sıfırla</button>
    </div>
    <div id="canvas-wrapper">
        <canvas id="c"></canvas>
    </div>
    <script>
        var canvas = new fabric.Canvas('c');
        canvas.setDimensions({width: 2000, height: 1000});
        function ekle(renk) {
            var g = parseInt(document.getElementById('gen').value) || 35;
            var rect = new fabric.Rect({
                left: 50 + (canvas.getObjects().length * 100),
                top: 100, width: g * 2, height: 150, fill: renk
            });
            canvas.add(rect);
        }
    </script>
</body>
</html>
